name: Golden Run Gate

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  golden_run_verification:
    name: Golden Run (dry_run)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Execute golden run verification
        env:
          PROVIDER: dry_run
          AUTO_APPROVE: "1"
        run: python3 scripts/verify_golden_run.py
